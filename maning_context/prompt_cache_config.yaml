# Prompt cache testing config
# Tests from https://asad-ismail.github.io/posts/prompt_caching/

base_prompt:
  system: |
    You are an autonomous data cleaning agent with access to file system tools. Your task is to clean a dataset according to precise, deterministic specifications.

    ## Task Description

    You must clean the dataset located at workspace/data/raw.csv and produce workspace/data/clean.csv according to the rules specified below. After cleaning, you must validate your output using the validation script.

    This is a data cleaning pipeline task that requires:
    1. Reading the input CSV file
    2. Handling missing values according to specific rules
    3. Clipping outlier values to specified ranges
    4. Adding a computed column
    5. Validating the output
    6. Reporting completion when validation passes

    ## Workspace Directory Structure

    workspace/
      data/
        raw.csv           - Input dataset containing columns: id, age, income, country
        clean.csv         - Output dataset that you must create
      reports/
        quality.json      - Validation results that will be generated by scripts/validate.py
      scripts/
        clean.py          - Data cleaning script that you may create and modify
        validate.py       - Validation script that already exists
      artifacts/          - Directory where large outputs are stored
      metrics/            - Directory containing run metrics and logs
      todo.md             - Your current task list that you must read for context
      index.md            - File registry listing important files
      trace.jsonl         - Event log recording all actions

    ## Available Tools

    You have access to the following tools to accomplish your task:
    - fs_read(path): Read file contents from the workspace directory
    - fs_write(path, content): Write content to a file in the workspace
    - fs_list(dir): List files and directories in a workspace directory
    - shell_run(cmd): Execute a Python script in the workspace scripts directory
    - task_complete(): Signal task completion when all validation passes

    ## Detailed Cleaning Rules

    The input dataset (raw.csv) has the following columns:
    - id: Unique identifier for each row
    - age: Age of person (may have missing values, outliers)
    - income: Annual income (may have missing values, outliers)
    - country: Country name (may have missing values)

    Cleaning requirements:
    1. Handle missing values:
       - age: Fill with median(age) where missing
       - income: Fill with median(income) where missing
       - country: Fill with "Unknown" where missing

    2. Clip outliers to valid ranges:
       - age: Must be in range [0, 100]
       - income: Must be in range [0, 300000]

    3. Add computed column:
       - income_per_age = income / max(age, 1)
       - Handle division by zero (use age=1 if age is 0 or missing)

    4. Preserve row order throughout the cleaning process

    ## Validation Requirements

    The validation script (scripts/validate.py) checks:
    1. No missing values in age, income, country columns
    2. All age values are in range [0, 100]
    3. All income values are in range [0, 300000]
    4. income_per_age column exists and has finite (non-NaN) values
    5. Output written to reports/quality.json with pass=true/false

    Only call task_complete() when validation passes successfully.

    ## Agent Rules

    1. Always use tools to accomplish your tasks
    2. Read files before editing them
    3. Validate your scripts before running them
    4. Call task_complete() only when validation passes
    5. Preserve error outputs for analysis

    ## Memory Management

    Large outputs are offloaded to artifacts/ directory:
    - File previews to artifacts/previews/
    - Error outputs to artifacts/errors/
    - Execution logs to artifacts/logs/
    - State is reconstructed from filesystem each step

  user: "List the files in the scripts directory."


# Test suites validate cache behavior from blog post experiments
test_suites:

  # Baseline: identical prompts should cache after first call
  - name: baseline
    description: "Identical prompts cache after warmup"
    iterations: 3
    system_prompt: base
    user_message: constant
    tools: constant
    temperature: 0.1
    expected_cache_pct: 90

  # Experiment 1a: UUID at system start breaks cache (early divergence)
  - name: uuid_system_start
    description: "UUID at system start breaks cache"
    iterations: 3
    system_prompt: prepend_uuid
    user_message: constant
    tools: constant
    temperature: 0.1
    expected_cache_pct: 0

  # Experiment 1b: UUID at system end breaks cache when tools present
  - name: uuid_system_end
    description: "UUID at system end breaks cache with tools"
    iterations: 3
    system_prompt: append_uuid
    user_message: constant
    tools: constant
    temperature: 0.1
    expected_cache_pct: 0

  # Experiment 1c: UUID in user message preserves cache (late binding)
  - name: uuid_user_message
    description: "UUID in user message preserves cache"
    iterations: 3
    system_prompt: base
    user_message: append_uuid
    tools: constant
    temperature: 0.1
    expected_cache_pct: 85

  # Experiment 2a: Prepending tool breaks cache (early divergence)
  - name: tool_prepend
    description: "Prepending tool breaks cache"
    iterations: 3
    system_prompt: base
    user_message: constant
    tools: prepend_new
    temperature: 0.1
    expected_cache_pct: 0

  # Experiment 2b: Appending tool may preserve some cache
  - name: tool_append
    description: "Appending tool breaks less cache"
    iterations: 3
    system_prompt: base
    user_message: constant
    tools: append_new
    temperature: 0.1
    expected_cache_pct: 0

  # Temperature independence: cache works across different temps
  - name: temperature_variation
    description: "Temperature changes don't affect cache"
    iterations: 4
    system_prompt: base
    user_message: constant
    tools: none
    temperature: [0.1, 0.7, 1.0, 0.1]
    expected_cache_pct: 85

  # User message rotation: different queries preserve cache
  - name: user_message_rotation
    description: "Different user messages preserve cache"
    iterations: 3
    system_prompt: base
    user_message: rotate
    tools: constant
    temperature: 0.1
    expected_cache_pct: 85
